<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>CEF OSR Demo</title>
<style>
  html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: #0b1422;
  }
  canvas {
    display: block;
    width: 100%;
    height: 100%;
  }
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
  const canvas = document.getElementById('c');
  const ctx    = canvas.getContext('2d');

  const BALLS = [
    { color: '#ff2222', stroke: '#ff8888' },
    { color: '#22cc44', stroke: '#88ffaa' },
    { color: '#ffdd00', stroke: '#ffee88' },
    { color: '#ffffff', stroke: '#aaaaaa' },
    { color: '#111111', stroke: '#555555' },
  ];
  const RADIUS = 24;
  const SPEED  = 180; // px per second

  function rand(min, max) { return min + Math.random() * (max - min); }

  let balls = [];

  function init() {
    const W = canvas.width;
    const H = canvas.height;
    balls = BALLS.map(({ color, stroke }) => {
      const angle = rand(0, 2 * Math.PI);
      return {
        x:  rand(RADIUS, W - RADIUS),
        y:  rand(RADIUS, H - RADIUS),
        vx: Math.cos(angle) * SPEED,
        vy: Math.sin(angle) * SPEED,
        color,
        stroke,
      };
    });
  }

  function resize() {
    canvas.width  = canvas.clientWidth;
    canvas.height = canvas.clientHeight;
    // Keep existing balls but clamp to new bounds (or re-init on first call).
    if (balls.length === 0) {
      init();
    } else {
      const W = canvas.width;
      const H = canvas.height;
      balls.forEach(b => {
        b.x = Math.min(Math.max(b.x, RADIUS), W - RADIUS);
        b.y = Math.min(Math.max(b.y, RADIUS), H - RADIUS);
      });
    }
  }

  let lastTime = null;

  function frame(now) {
    if (!lastTime) lastTime = now;
    const dt = Math.min((now - lastTime) / 1000, 0.05); // seconds, cap at 50ms
    lastTime = now;

    const W = canvas.width;
    const H = canvas.height;

    // Update positions and bounce.
    balls.forEach(b => {
      b.x += b.vx * dt;
      b.y += b.vy * dt;

      if (b.x - RADIUS < 0)     { b.x = RADIUS;     b.vx =  Math.abs(b.vx); }
      if (b.x + RADIUS > W)     { b.x = W - RADIUS; b.vx = -Math.abs(b.vx); }
      if (b.y - RADIUS < 0)     { b.y = RADIUS;     b.vy =  Math.abs(b.vy); }
      if (b.y + RADIUS > H)     { b.y = H - RADIUS; b.vy = -Math.abs(b.vy); }
    });

    // Draw background.
    ctx.fillStyle = '#0b1422';
    ctx.fillRect(0, 0, W, H);

    // Draw each ball with a simple glow.
    balls.forEach(b => {
      const grad = ctx.createRadialGradient(
        b.x - RADIUS * 0.3, b.y - RADIUS * 0.3, RADIUS * 0.1,
        b.x, b.y, RADIUS
      );
      grad.addColorStop(0, b.stroke);
      grad.addColorStop(1, b.color);

      ctx.beginPath();
      ctx.arc(b.x, b.y, RADIUS, 0, 2 * Math.PI);
      ctx.fillStyle = grad;
      ctx.fill();

      // Subtle outline for visibility against dark background.
      ctx.strokeStyle = b.stroke;
      ctx.lineWidth = 1.5;
      ctx.stroke();
    });

    requestAnimationFrame(frame);
  }

  window.addEventListener('resize', resize);
  resize();
  requestAnimationFrame(frame);
</script>
</body>
</html>
